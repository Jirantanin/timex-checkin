name: TimeX Check-in

on:
  schedule:
    - cron: '40 2 * * 1-5'  # 09:40 Mon-Fri Asia/Bangkok = 02:40 UTC
  workflow_dispatch:  # กดรันมือได้

jobs:
  checkin:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Bangkok
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run check-in
        id: checkin
        run: |
          node checkin.js 2>&1 | tee checkin.log
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        env:
          EMPLOYEE_ID: ${{ secrets.TIMEX_EMPLOYEE_ID }}
          PASSWORD: ${{ secrets.TIMEX_PASSWORD }}
          SECRET_KEY: ${{ secrets.TIMEX_SECRET_KEY }}
          LOCATION_LAT: ${{ secrets.TIMEX_LOCATION_LAT }}
          LOCATION_LNG: ${{ secrets.TIMEX_LOCATION_LNG }}
          LOCATION_NAME: ${{ secrets.TIMEX_LOCATION_NAME }}

      - name: Notify Skipped (Holiday / Leave)
        if: success()
        run: |
          SKIPPED=$(grep -c '"skipped": true' checkin.log || true)
          if [ "$SKIPPED" != "0" ]; then
            SKIP_REASON=$(grep '"message":' checkin.log | head -1 | sed 's/.*"message": *"\?//' | sed 's/"\?.*//')
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d text="⏭️ TimeX Check-in ถูกข้าม ($(date '+%H:%M:%S'))\n$SKIP_REASON"
          else
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d text="✅ TimeX Check-in สำเร็จค่ะ ($(date '+%H:%M:%S'))"
          fi

      - name: Notify Failure
        if: failure()
        run: |
          ERROR_DETAIL=$(grep '"error":' checkin.log | head -1 | sed 's/.*"error": *"\?//' | sed 's/"\?.*//')
          if [ -z "$ERROR_DETAIL" ]; then
            ERROR_DETAIL=$(grep -E "❌|Error:" checkin.log | head -1 | sed 's/❌//g' | sed 's/Error://g' | xargs)
          fi
          if [ -z "$ERROR_DETAIL" ]; then
            ERROR_DETAIL="ไม่ทราบสาเหตุ"
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="❌ TimeX Check-in ล้มเหลวค่ะ ($(date '+%H:%M:%S'))\nสาเหตุ: $ERROR_DETAIL"
