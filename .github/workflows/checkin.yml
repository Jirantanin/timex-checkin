name: TimeX Check-in

on:
  schedule:
    - cron: '40 9 * * 1-5'  # 09:40 Mon-Fri (Asia/Bangkok = UTC+7, so 02:40 UTC)
  workflow_dispatch:  # กดรันมือได้

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run check-in
        id: checkin
        run: node checkin.js
        env:
          EMPLOYEE_ID: ${{ secrets.TIMEX_EMPLOYEE_ID }}
          PASSWORD: ${{ secrets.TIMEX_PASSWORD }}
          SECRET_KEY: ${{ secrets.TIMEX_SECRET_KEY }}
          LOCATION_LAT: ${{ secrets.TIMEX_LOCATION_LAT }}
          LOCATION_LNG: ${{ secrets.TIMEX_LOCATION_LNG }}
          LOCATION_NAME: ${{ secrets.TIMEX_LOCATION_NAME }}

      - name: Notify Success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="✅ TimeX Check-in สำเร็จค่ะ ($(date '+%H:%M:%S'))"

      - name: Notify Failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="❌ TimeX Check-in ล้มเหลวค่ะ ($(date '+%H:%M:%S'))"
