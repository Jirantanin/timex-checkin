name: TimeX Check-in

on:
  schedule:
    - cron: '40 2 * * 1-5'  # 09:40 Mon-Fri Asia/Bangkok = 02:40 UTC
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Bangkok
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run check-in
        id: checkin
        run: |
          set +e
          node checkin.js 2>&1 | tee checkin.log
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          exit 0
        env:
          EMPLOYEE_ID: ${{ secrets.TIMEX_EMPLOYEE_ID }}
          PASSWORD: ${{ secrets.TIMEX_PASSWORD }}
          SECRET_KEY: ${{ secrets.TIMEX_SECRET_KEY }}
          LOCATION_LAT: ${{ secrets.TIMEX_LOCATION_LAT }}
          LOCATION_LNG: ${{ secrets.TIMEX_LOCATION_LNG }}
          LOCATION_NAME: ${{ secrets.TIMEX_LOCATION_NAME }}

      - name: Notify Result
        if: always()
        run: |
          EXIT_CODE="${{ steps.checkin.outputs.exit_code }}"
          SKIPPED=$(grep -c '"skipped": true' checkin.log || true)
          MESSAGE=$(grep '"message":' checkin.log | tail -1 | sed 's/.*"message": *"\?//' | sed 's/"\?.*//' || true)
          ERROR_DETAIL=$(grep '"error":' checkin.log | tail -1 | sed 's/.*"error": *"\?//' | sed 's/"\?.*//' || true)

          if [ "$SKIPPED" != "0" ]; then
            SKIP_REASON="$MESSAGE"
            if [ -z "$SKIP_REASON" ]; then
              SKIP_REASON="Holiday or leave"
            fi
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d text="TimeX Check-in skipped ($(date '+%H:%M:%S'))\n$SKIP_REASON"
          elif [ "${EXIT_CODE:-1}" = "0" ]; then
            SUCCESS_DETAIL="$MESSAGE"
            if [ -n "$SUCCESS_DETAIL" ]; then
              curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
                -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
                -d text="TimeX Check-in success ($(date '+%H:%M:%S'))\n$SUCCESS_DETAIL"
            else
              curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
                -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
                -d text="TimeX Check-in success ($(date '+%H:%M:%S'))"
            fi
          else
            if [ -z "$ERROR_DETAIL" ]; then
              ERROR_DETAIL=$(grep -E "Error:" checkin.log | tail -1 | sed 's/Error://g' | xargs || true)
            fi
            if [ -z "$ERROR_DETAIL" ]; then
              ERROR_DETAIL="$MESSAGE"
            fi
            if [ -z "$ERROR_DETAIL" ]; then
              ERROR_DETAIL="Unknown error"
            fi
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d text="TimeX Check-in failed ($(date '+%H:%M:%S'))\nReason: $ERROR_DETAIL"
          fi

      - name: Fail job when script failed
        if: always() && steps.checkin.outputs.exit_code != '0'
        run: |
          exit 1
